/****************************** Info Section ***************************************/

CameraModes
/* Ingame CameraModes */
            -1 = Default CarCameraView Medium height
            -2 = Default CarCameraView Low    height
            -3 = Default CarCameraView High   height
            -4 = Camera on SplinePath targeting car
            -5 = On board CameraView (for debug only)

/* Replay CameraModes */
            -10 = Default Static Replay Camera
            -11 = Standard Med CarCameraView
            -12 = Fisheye Camera in front of Car
            -13 = ReplayCamera Side View of Car
            -14 = ReplayCamera SideUp View of Car
            -15 = Standard Low CarCameraView




/************************** SCRIPT COMMANDS **************************************/

  L_CAR1_CONFIG: Car physics configuration filenumber
                 For normal levels use 1-maximum carnumber (e.g 1..15)
                 For Challenges start filenumbers at 101

  L_CAR1_REPLAY: Car Replayfile number.
                 for normal levels: encode LEVEL number into this!
                 e.g: (LEVEL2, CAR5) would be: 205
                 for challenges: use ChallengeNumber + 1000 -> 1001 for CHALLENGE1

 -TRACKTEXSET:   Set Tracktexture Directory (e.g 'TRACKSET01', 'TRACKSET02' )
                 not defined will use default Alias Tracktextures

 -L_CAR1_LIVERY: Set Carbody livery texturefile
                 range: [2..7] and 0 will randomly select a livery
                 not defined will randomly select a livery

 -L_CAR1_TYRE:   Set Car tyre texturefile
                 Range: [0..99] (depending on available tyre texturefiles)
                 not defined will default Alias tyretexture

 -GROUNDLEVEL:   Ground/Sea level in meters

 -GAMETYPE:      Set game/race type
                 Current GameTypes:
                                   RACE_TYPE_1
                                   TIMETRIAL_TYPE_1
                                   CHALLENGE_TYPE_1


 -LAPCOUNT:      Number of laps
                 range: [1..8]
                 0 = no lap detection (no lapcount display)

 -LAPRECORD:     Laprecord in Minutes:Seconds:Hundredths

 -CAMERAMODE:    Set default startup cameramode for a race/challenge
                 for all available modes see above!

